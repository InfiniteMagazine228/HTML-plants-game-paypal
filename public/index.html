<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Grow a Garden Pro</title><link rel="stylesheet" href="/styles.css"></head><body>
<header><h1>Grow a Garden Pro</h1><p>Login, trồng cây, mua coins PayPal tự động 🌱</p></header>
<section class="auth-card" id="authCard"><h2>Đăng nhập / Đăng ký</h2><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><div class="row"><button onclick="signUp()">Đăng ký</button><button onclick="signIn()">Đăng nhập</button></div><p class="hint">Cần bật Supabase Email/Password Auth.</p></section>
<main id="game" class="hidden"><section class="topbar"><div class="pill">👤 <span id="userEmail"></span></div><button class="danger" onclick="signOut()">Đăng xuất</button></section><section class="stats"><div class="pill">🪙 Coins: <span id="coins">0</span></div><div class="pill">🌰 Seeds: <span id="seeds">0</span></div><div class="pill">🏆 Harvests: <span id="harvests">0</span></div></section><section id="garden" class="garden"></section><section class="controls"><button class="seed" onclick="buySeeds()">Mua 3 seeds - 10 coins</button><button onclick="waterAll()">Tưới tất cả 💧</button><button class="shop" onclick="openShop()">🛒 Shop Coins</button><button class="danger" onclick="resetGame()">Reset</button></section><div id="message" class="message">Chào mừng tới vườn!</div></main>
<div id="shopModal" class="modal"><div class="shop-panel"><div class="shop-head"><h2>🛒 PayPal Coin Shop</h2><button class="dark" onclick="closeShop()">Đóng</button></div><div class="packs" id="packs"></div><p class="note">Thanh toán xong backend capture PayPal order và cộng coins vào Supabase.</p></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/app.js"></script></body></html>
