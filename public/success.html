<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Payment Success</title><link rel="stylesheet" href="/styles.css"></head><body><section class="auth-card"><h1>Đang xác nhận thanh toán...</h1><p id="status">Vui lòng chờ vài giây.</p><a class="link-button" href="/">Quay lại game</a></section><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
async function init(){const config=await fetch('/api/config').then(r=>r.json());const sb=supabase.createClient(config.supabaseUrl,config.supabaseAnonKey);const {data}=await sb.auth.getSession();const token=data.session?.access_token;if(!token){status.textContent='Bạn cần đăng nhập lại rồi quay về game.';return}const orderId=new URLSearchParams(location.search).get('token');if(!orderId){status.textContent='Không thấy PayPal order token.';return}const res=await fetch('/api/paypal/capture-order',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},body:JSON.stringify({orderId})});const result=await res.json();status.textContent=res.ok?'Thanh toán thành công! Coins đã được cộng. Quay lại game nhé.':'Lỗi: '+(result.error||'capture failed')}
init();</script></body></html>
